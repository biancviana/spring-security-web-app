<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tela de Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .erro {
            color: red;
            margin-bottom: 10px;
            text-align: center;
        }

        .sucesso {
            color: green;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Login</h2>

    <!-- ERRO -->
    <div th:if="${param.error}" class="erro">
        Usuário ou senha inválidos!
    </div>

    <!-- LOGOUT -->
    <div th:if="${param.logout}" class="sucesso">
        Logout realizado com sucesso!
    </div>

    <form method="post" action="/login">

        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <input type="text" name="username" placeholder="Usuário" required>

        <input type="password" name="password" placeholder="Senha" required>

        <button type="submit">Entrar</button>
    </form>

</div>

</body>
</html>
